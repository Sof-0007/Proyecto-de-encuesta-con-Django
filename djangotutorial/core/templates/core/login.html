{% extends 'base.html' %}

{% block title %}Iniciar Sesión - IA y Redes Neuronales{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="card max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold gradient-text mb-2">
                <i class="fas fa-sign-in-alt mr-2"></i>Iniciar Sesión
            </h1>
            <p class="text-gray-400">Accede a tu cuenta para continuar</p>
        </div>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="username" class="block text-sm font-medium mb-2">
                    Correo electrónico o usuario
                </label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required
                    class="w-full px-4 py-2 bg-rgba(255, 255, 255, 0.05) border border-rgba(255, 255, 255, 0.1) rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 transition"
                    placeholder="tu_usuario"
                >
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium mb-2">
                    Contraseña
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required
                    class="w-full px-4 py-2 bg-rgba(255, 255, 255, 0.05) border border-rgba(255, 255, 255, 0.1) rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 transition"
                    placeholder="••••••••"
                >
            </div>
            
            <button type="submit" class="w-full btn-primary py-3 font-semibold">
                <i class="fas fa-lock mr-2"></i>Iniciar Sesión
            </button>
        </form>
        
        <div class="mt-8 text-center text-sm">
            <p class="text-gray-400">
                ¿No tienes cuenta?
                <a href="{% url 'register' %}" class="text-indigo-400 hover:text-indigo-300 font-semibold transition">
                    Regístrate aquí
                </a>
            </p>
        </div>
        
        <div class="mt-6 pt-6 border-t border-gray-700">
            <div class="relative mb-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-700"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-rgba(99, 102, 241, 0.05) text-gray-400">O</span>
                </div>
            </div>
            
            <button type="button" class="w-full py-2 px-4 border border-rgba(255, 255, 255, 0.1) rounded-lg hover:bg-rgba(255, 255, 255, 0.05) transition mb-3">
                <i class="fab fa-google mr-2"></i>Iniciar con Google
            </button>
            <button type="button" class="w-full py-2 px-4 border border-rgba(255, 255, 255, 0.1) rounded-lg hover:bg-rgba(255, 255, 255, 0.05) transition">
                <i class="fab fa-apple mr-2"></i>Iniciar con Apple
            </button>
        </div>
    </div>
</section>
{% endblock %}
